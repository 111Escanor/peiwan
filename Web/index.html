<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Escanor陪玩平台</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div id="app">
        <h2>无畏契约陪玩平台</h2>
        <div v-for="m in masters" :key="m.id">
            <h3>陪玩师：{{m.name}}</h3>
            <p>段位：{{m.rank}} | 价格：{{m.price}}/小时</p>
            <button @click="order(m.id)">立即下单</button>
            <hr>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                masters: []
            },
            mounted() {
                axios.get("http://127.0.0.1:5000/api/masters")
                    .then(res => this.masters = res.data)
            },
            methods: {
                order(mid) {
                    axios.post("http://127.0.0.1:5000/api/order", {
                        user_id: 1,
                        master_id: mid
                    }).then(res => alert(res.data.msg))
                }
            }
        })
    </script>
</body>
</html>
